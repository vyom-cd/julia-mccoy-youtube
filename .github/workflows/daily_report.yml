name: Daily YouTube Comments Report

on:
  schedule:
    - cron: '30 3 * * *'  # 9:00 AM IST (3:30 AM UTC)
  workflow_dispatch:  # Manual trigger button

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Scrape comments
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python -c "from tools.scrape_comments import run; run()"

      - name: Classify comments
        run: python -c "from tools.classify_comments import run; run()"

      - name: Send report
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
        run: python -c "from tools.send_report import run; run()"
